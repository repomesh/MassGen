# uv run massgen --config @examples/features/fast_iteration.yaml "Create an svg of an AI agent coding."

agents:
- id: agent_a
  backend:
    type: gemini
    model: gemini-3-flash-preview
    # type: codex
    # model: gpt-5.4
    # reasoning:
    #   effort: high
    #   summary: auto
    cwd: workspace
    enable_code_based_tools: true
    exclude_file_operation_mcps: true
    enable_mcp_command_line: true
    command_line_execution_mode: docker
    command_line_docker_image: ghcr.io/massgen/mcp-runtime-sudo:latest
    # command_line_docker_image: massgen/mcp-runtime-sudo:latest
    command_line_docker_network_mode: bridge
    command_line_docker_enable_sudo: true
    command_line_docker_credentials:
      env_file: .env
      env_vars_from_file:
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
      - GOOGLE_API_KEY
      - GEMINI_API_KEY
    shared_tools_directory: shared_tools
    auto_discover_custom_tools: false
    enable_web_search: false
- id: agent_b
  backend:
    type: claude_code
    model: claude-sonnet-4-6
    cwd: workspace
    enable_code_based_tools: true
    exclude_file_operation_mcps: true
    enable_mcp_command_line: true
    command_line_execution_mode: docker
    command_line_docker_image: ghcr.io/massgen/mcp-runtime-sudo:latest
    # command_line_docker_image: massgen/mcp-runtime-sudo:latest
    command_line_docker_network_mode: bridge
    command_line_docker_enable_sudo: true
    command_line_docker_credentials:
      env_file: .env
      env_vars_from_file:
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
      - GOOGLE_API_KEY
      - GEMINI_API_KEY
    shared_tools_directory: shared_tools
    auto_discover_custom_tools: false
    enable_web_search: false
orchestrator:
  snapshot_storage: snapshots
  agent_temporary_workspace: temp_workspaces
  voting_sensitivity: checklist_gated
  voting_threshold: 3
  max_new_answers_per_agent: 5
  fairness_enabled: true
  fairness_lead_cap_answers: 2
  max_midstream_injections_per_round: 2
  defer_peer_updates_until_restart: true
  allow_midstream_peer_updates_before_checklist_submit: true  # ensure we don't get a new answer after checklist submission, else rounds will go on too long. make this default?
  enable_multimodal_tools: true
  image_generation_backend: openai
  video_generation_backend: openai
  audio_generation_backend: openai
  coordination:
    fast_iteration_mode: true
    # Orthogonal speed knobs (prompt-only enforcement, shaped from turn 0).
    # These are the same defaults applied by `uv run massgen --fast ...`.
    max_verifications_per_round: 1  # One verify pass per round; gaps → Known Gaps in changedoc
    max_internal_fix_loops: 0       # No build → verify → fix → re-verify loops within a round
    skip_redundant_scaffolding: true  # On restart, continue from existing scaffolding files
    max_orchestration_restarts: 0
    learning_capture_mode: verification_and_final_only
    use_skills: true
    skills_directory: .agent/skills
    enable_agent_task_planning: true
    task_planning_filesystem_mode: true
    enable_memory_filesystem_mode: true
    # for pre-collab eval criteria generation
    # evaluation_criteria_generator:
    #    enabled: true
    write_mode: auto
  context_paths: []
timeout_settings:
  orchestrator_timeout_seconds: 3600
  initial_round_timeout_seconds: 1200
  subsequent_round_timeout_seconds: 900
  round_timeout_grace_seconds: 300
ui:
  display_type: textual_terminal
  logging_enabled: true
